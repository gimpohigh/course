<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김포고 수강신청 사이트</title>
    <style>
        body {
            /* 흰색 바탕 및 화면 전체 높이 사용 */
            background-color: white;
            height: 100vh;
            margin: 0;
            
            /* 요소를 화면 정중앙에 배치 (Flexbox) */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            /* 텍스트 스타일: 검은색, 굵게, 가운데 정렬 */
            color: black;
            font-weight: bold;
            text-align: center;
            line-height: 1.6;
            
            /* 글씨 크기를 이전(3배)의 절반인 1.5배(1.5em)로 설정 */
            font-size: 1.5em; 
        }

        .content {
            margin-bottom: 30px; /* 텍스트와 링크 사이의 간격 */
        }

        a {
            /* 파란색 밑줄 링크 스타일 */
            color: blue;
            text-decoration: underline;
            font-weight: normal; 
        }
    </style>
</head>
<body>

    <div class="content">
        <br>
        <br>
        사이트 오류 고치는 중입니다! 죄송합니다!<br>
 
    </div>

</body>
</html>
